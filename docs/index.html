<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세계 경제 제재 검색 서비스</title>
    <!-- 구글 폰트 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 로그인 섹션 -->
    <section id="login-section">
        <div class="page-title-header">
            <h1>세계 경제 제재 검색 서비스</h1>
        </div>
        <div class="login-container">
            <div class="login-header">
                <h2>WVL 제재 조회 시스템</h2>
                <p>UN, EU, US의 제재 대상을 검색하세요</p>
            </div>
            <div class="login-body">
                <div class="alert-container"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input type="email" id="email" placeholder="이메일을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                    <button type="submit" class="btn-primary">로그인</button>
                </form>
                <div class="login-footer">
                    <p>테스트 계정: jaesu@kakao.com / 1234</p>
                    <div class="login-links">
                        <a href="#" id="register-link">회원가입</a>
                        <a href="#" id="help-link">도움말</a>
                        <a href="#" id="about-link">회사소개</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 메인 섹션 -->
    <section id="main-section" style="display: none;">
        <header class="main-header">
            <div class="header-logo">
                <h1>세계 경제 제재 검색 서비스</h1>
            </div>
            <div class="user-info">
                <span>안녕하세요, <span id="user-name">사용자</span>님!</span>
                <button id="logout-btn" class="btn-secondary">로그아웃</button>
            </div>
        </header>

        <div class="container">
            <div class="alert-container"></div>
            
            <!-- 검색 영역 -->
            <div class="search-area">
                <h2>제재 대상 검색</h2>
                <form id="search-form">
                    <div class="search-input-group">
                        <input type="text" id="search-input" placeholder="이름, 기관명, 키워드 등을 입력하세요" required>
                        <button type="submit" class="search-btn">
                            검색
                        </button>
                    </div>
                    
                    <button type="button" id="advanced-toggle" class="btn-text">
                        <i class="fas fa-sliders-h"></i> 고급 검색
                    </button>
                    
                    <div id="advanced-search" class="advanced-search">
                        <!-- 고급 검색 옵션 -->
                        <div class="advanced-row">
                            <div class="form-group">
                                <label for="search-type">검색 유형</label>
                                <select id="search-type">
                                    <option value="text">텍스트 검색</option>
                                    <option value="number">번호 검색</option>
                                    <option value="image">이미지 검색</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="number-type">번호 유형</label>
                                <select id="number-type">
                                    <option value="passport">여권번호</option>
                                    <option value="id">주민번호</option>
                                    <option value="other">기타 번호</option>
                                </select>
                            </div>
                        </div>
                        <div class="advanced-row">
                            <div class="form-group">
                                <label for="country">국가</label>
                                <select id="country">
                                    <option value="">모든 국가</option>
                                    <option value="NK">북한</option>
                                    <option value="RU">러시아</option>
                                    <option value="IR">이란</option>
                                    <option value="SY">시리아</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="program">제재 프로그램</label>
                                <select id="program">
                                    <option value="">모든 프로그램</option>
                                    <option value="UN_SANCTIONS">UN 제재</option>
                                    <option value="EU_SANCTIONS">EU 제재</option>
                                    <option value="US_SANCTIONS">US 제재</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- 검색 결과 영역 -->
            <div class="search-results">
                <div class="results-header">
                    <h3>검색 결과</h3>
                    <div class="results-count">총 <span id="results-count">0</span>건</div>
                </div>
                <div id="results-list" class="results-list"></div>
            </div>

            <!-- 최신 업데이트 정보 -->
            <div class="update-info">
                <p>마지막 업데이트: <span id="last-update">2025-03-26 12:00 LT</span></p>
            </div>
        </div>
    </section>

    <!-- 상세 정보 모달 -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>제재 대상 상세 정보</h2>
                <button id="detail-close" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="detail-content"></div>
            </div>
            <div class="modal-footer">
                <button id="detail-print" class="btn-secondary">
                    <i class="fas fa-print"></i> 인쇄
                </button>
                <button id="detail-download" class="btn-secondary">
                    <i class="fas fa-download"></i> PDF 다운로드
                </button>
            </div>
        </div>
    </div>

    <!-- 스크립트 -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
