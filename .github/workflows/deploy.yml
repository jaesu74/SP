name: Deploy Sanctions Search System

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 9 * * 0,3,4'  # 일요일(0), 수요일(3), 목요일(4) 오전 9시에 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 요구사항 파일 확인
          echo "Content of requirements.txt:"
          cat requirements.txt
          # 패키지 설치
          pip install -r requirements.txt
          pip list
          
      - name: Environment Setup
        run: |
          # 필요한 디렉토리 생성
          mkdir -p docs/data
          mkdir -p logs
          # 파일 시스템 확인
          echo "Project structure:"
          find . -type f -name "*.py" | sort
          # Python 버전 확인
          python --version
          # 파일 인코딩 확인
          file sanctions_collector.py
          # collectors 패키지 확인
          ls -la collectors/
          
      - name: Update sanctions data
        run: |
          # 실행 경로 확인
          pwd
          echo "Running sanctions collector..."
          # 현재 디렉토리를 Python 경로에 추가
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          # 모든 제재 데이터 수집 (UN, EU, US)
          python -m sanctions_collector
          echo "Collector execution completed"
          # 결과 확인
          ls -la docs/data
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages 